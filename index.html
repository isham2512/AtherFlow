<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AtherFlow – Play YouTube, TeraBox, MP3 and audio links in one place.">
  <title>AtherFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <audio id="audio-player"></audio>

  <div class="ambient" aria-hidden="true">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="notes-wrap" id="notes-wrap"></div>
  </div>

  <main class="wrapper">
    <div class="card" id="player-card">

      <div class="hdr">
        <span class="brand">AtherFlow</span>
        <div class="hdr-btns">
          <button id="btn-history" class="icon-btn" title="History"><i
              class="fa-solid fa-clock-rotate-left"></i></button>
          <button id="btn-theme" class="icon-btn" title="Theme"> <i class="fa-solid fa-moon"></i></button>
        </div>
      </div>

      <div class="importer">
        <div class="url-box">
          <i class="fa-solid fa-link"></i>
          <input id="url-input" type="text" placeholder="Paste YouTube, TeraBox, MP3 or any audio link…"
            autocomplete="off">
        </div>
        <button id="btn-load" class="load-btn" title="Load"><i class="fa-solid fa-arrow-right"></i></button>
      </div>
      <span id="url-error" class="err-msg"></span>

      <div class="media-box" id="media-box">

        <div class="cover-state" id="cover-state">
          <img id="album-art" class="album-art" src="https://img.youtube.com/vi/TW9d8vYrVFQ/hqdefault.jpg" alt="Cover">
          <div class="eq-bars">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span>
          </div>
        </div>

        <div class="video-state hidden" id="video-state">
          <div id="yt-player"></div>
          <iframe id="plain-iframe" class="plain-iframe hidden"
            allow="autoplay; fullscreen; picture-in-picture; accelerometer; encrypted-media" allowfullscreen
            frameborder="0"></iframe>

          <button id="btn-fullscreen" class="fs-btn" title="Fullscreen">
            <i class="fa-solid fa-expand"></i>
          </button>
        </div>

      </div>

      <div class="track-info">
        <h2 id="track-title">Sky High</h2>
        <p id="track-sub">Elektronomia · NCS Release</p>
      </div>

      <div class="prog-row" id="prog-row">
        <span id="t-cur" class="t-label">0:00</span>
        <input id="prog-slider" type="range" min="0" max="100" value="0" step="0.1">
        <span id="t-tot" class="t-label">0:00</span>
      </div>

      <div class="ctrl-row">
        <button id="btn-prev" class="ctrl-btn" title="Previous"><i class="fa-solid fa-backward-step"></i></button>
        <button id="btn-play" class="play-btn" title="Play / Pause"><i class="fa-solid fa-play"></i></button>
        <button id="btn-next" class="ctrl-btn" title="Next"><i class="fa-solid fa-forward-step"></i></button>
      </div>

      <div class="vol-row">
        <button id="btn-mute" class="mute-btn" title="Mute"><i class="fa-solid fa-volume-high"></i></button>
        <input id="vol-slider" type="range" min="0" max="100" value="75">
        <span id="vol-label" class="vol-pct">75%</span>
      </div>

      <div class="queue-section">
        <div class="queue-hdr">
          <span id="queue-label">Up Next</span>
          <div style="display: flex; align-items: center; gap: 8px;">
            <button id="btn-clear-history" class="clear-btn hidden" title="Clear History">
              <i class="fa-solid fa-trash-can"></i> Clear
            </button>
            <span id="queue-count" class="q-count">1 track</span>
          </div>
        </div>
        <div id="queue-list" class="queue-list"></div>
      </div>

    </div>
  </main>

  <div id="toasts" class="toast-stack"></div>

  <script>
    try {
      var _s = JSON.parse(localStorage.getItem('af4') || 'null');
      if (_s && _s.playlist && _s.playlist[0] && _s.playlist[0].youtubeId === 'bM7SZ5SBzyY')
        localStorage.removeItem('af4');
    } catch (e) { localStorage.removeItem('af4'); }
  </script>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="script.js"></script>
</body>

</html>
